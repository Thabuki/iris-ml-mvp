<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>
      Classificação de Espécies de Íris
    </title>
    <link
      rel="stylesheet"
      href="./css/styles.css"
    />
  </head>
  <body>
    <main class="app-card">
      <!-- Título principal da aplicação. -->
      <h1>
        Classificação de Espécies de
        Íris
      </h1>

      <!-- Grade com os quatro atributos exigidos pelo modelo. -->
      <div class="fields-grid">
        <div class="field">
          <label for="sepal_length"
            >Comprimento da
            Sépala</label
          >
          <!-- Campo numérico com sufixo visual em centímetros e controles customizados. -->
          <div class="input-with-unit">
            <input
              type="number"
              id="sepal_length"
              step="0.1"
              min="4.3"
              max="7.9"
            />
            <span
              class="value-sizer"
              aria-hidden="true"
            ></span>
            <span class="unit">cm</span>
            <div class="step-controls">
              <button
                type="button"
                class="step-button"
                data-target="sepal_length"
                data-direction="up"
                aria-label="Aumentar comprimento da sépala"
              >
                ▲
              </button>
              <button
                type="button"
                class="step-button"
                data-target="sepal_length"
                data-direction="down"
                aria-label="Diminuir comprimento da sépala"
              >
                ▼
              </button>
            </div>
          </div>
          <div
            id="sepal_length_hint"
            class="range-hint"
          ></div>
        </div>

        <div class="field">
          <label for="sepal_width"
            >Largura da Sépala</label
          >
          <!-- Campo numérico com sufixo visual em centímetros e controles customizados. -->
          <div class="input-with-unit">
            <input
              type="number"
              id="sepal_width"
              step="0.1"
              min="2.0"
              max="4.4"
            />
            <span
              class="value-sizer"
              aria-hidden="true"
            ></span>
            <span class="unit">cm</span>
            <div class="step-controls">
              <button
                type="button"
                class="step-button"
                data-target="sepal_width"
                data-direction="up"
                aria-label="Aumentar largura da sépala"
              >
                ▲
              </button>
              <button
                type="button"
                class="step-button"
                data-target="sepal_width"
                data-direction="down"
                aria-label="Diminuir largura da sépala"
              >
                ▼
              </button>
            </div>
          </div>
          <div
            id="sepal_width_hint"
            class="range-hint"
          ></div>
        </div>

        <div class="field">
          <label for="petal_length"
            >Comprimento da
            Pétala</label
          >
          <!-- Campo numérico com sufixo visual em centímetros e controles customizados. -->
          <div class="input-with-unit">
            <input
              type="number"
              id="petal_length"
              step="0.1"
              min="1.0"
              max="6.9"
            />
            <span
              class="value-sizer"
              aria-hidden="true"
            ></span>
            <span class="unit">cm</span>
            <div class="step-controls">
              <button
                type="button"
                class="step-button"
                data-target="petal_length"
                data-direction="up"
                aria-label="Aumentar comprimento da pétala"
              >
                ▲
              </button>
              <button
                type="button"
                class="step-button"
                data-target="petal_length"
                data-direction="down"
                aria-label="Diminuir comprimento da pétala"
              >
                ▼
              </button>
            </div>
          </div>
          <div
            id="petal_length_hint"
            class="range-hint"
          ></div>
        </div>

        <div class="field">
          <label for="petal_width"
            >Largura da Pétala</label
          >
          <!-- Campo numérico com sufixo visual em centímetros e controles customizados. -->
          <div class="input-with-unit">
            <input
              type="number"
              id="petal_width"
              step="0.1"
              min="0.1"
              max="2.5"
            />
            <span
              class="value-sizer"
              aria-hidden="true"
            ></span>
            <span class="unit">cm</span>
            <div class="step-controls">
              <button
                type="button"
                class="step-button"
                data-target="petal_width"
                data-direction="up"
                aria-label="Aumentar largura da pétala"
              >
                ▲
              </button>
              <button
                type="button"
                class="step-button"
                data-target="petal_width"
                data-direction="down"
                aria-label="Diminuir largura da pétala"
              >
                ▼
              </button>
            </div>
          </div>
          <div
            id="petal_width_hint"
            class="range-hint"
          ></div>
        </div>
      </div>

      <!-- Área reservada para resultado textual e imagem prevista. -->
      <div class="action-area">
        <p id="result"></p>

        <div
          id="predictionImageContainer"
          class="prediction-image hidden"
        >
          <img
            id="predictionImage"
            alt="Imagem da flor prevista"
          />
        </div>
      </div>
    </main>

    <script src="./js/script.js"></script>
  </body>
</html>
